apiVersion: prism-ctf.pwnlentoni.team/v1
kind: SharedChallenge
metadata:
  labels:
    app.kubernetes.io/name: prism-ctf
    app.kubernetes.io/managed-by: kustomize
  name: shared-challenge-sample
spec:
  template: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: "ctf-whoami-shared"
      namespace: prism-ctf-challenges
      labels:
        prism-ctf.pwnlentoni.team/type: web
        prism-ctf.pwnlentoni.team/name: whoami-shared
    spec:
      replicas: 1
      selector:
        matchLabels:
          prism-ctf.pwnlentoni.team/type: web
          prism-ctf.pwnlentoni.team/name: whoami-shared
      template:
        metadata:
          labels:
            prism-ctf.pwnlentoni.team/type: web
            prism-ctf.pwnlentoni.team/name: whoami-shared
        spec:
          enableServiceLinks: false
          automountServiceAccountToken: false
          containers:
          - name: web
            image: containous/whoami:latest 
            resources:
              limits:
                cpu: 20m
                memory: 64Mi
              requests:
                cpu: 10m
                memory: 32Mi
            ports:
            - containerPort: 80
              name: port-80
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: "ctf-whoami-shared"
      namespace: prism-ctf-challenges
      labels:
        prism-ctf.pwnlentoni.team/type: web
        prism-ctf.pwnlentoni.team/name: whoami-shared
    spec:
      selector:
        prism-ctf.pwnlentoni.team/type: web
        prism-ctf.pwnlentoni.team/name: whoami-shared
      ports:
        - port: 80
          name: port-80
    ---
    apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: ingress-ctf-whoami-shared
      namespace: prism-ctf-challenges
      labels:
        prism-ctf.pwnlentoni.team/type: web
        prism-ctf.pwnlentoni.team/name: whoami-shared
    spec:
      entryPoints:
        - web
        - websecure
      tls:
        certResolver: default
      routes:
        - match: Host(`whoami-shared.{{ .Domain }}`)
          kind: Rule
          priority: 10
          middlewares:
          - name: secure-headers
          services:
          - name: ctf-whoami-shared
            port: 80