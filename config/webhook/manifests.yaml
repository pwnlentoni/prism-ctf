---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-prism-ctf-pwnlentoni-team-v1-challengeinstance
  failurePolicy: Fail
  name: mchallengeinstance-v1.kb.io
  rules:
  - apiGroups:
    - prism-ctf.pwnlentoni.team
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - challengeinstances
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-prism-ctf-pwnlentoni-team-v1-isolatedchallenge
  failurePolicy: Fail
  name: misolatedchallenge-v1.kb.io
  rules:
  - apiGroups:
    - prism-ctf.pwnlentoni.team
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - isolatedchallenges
  sideEffects: None
