# This rule is not used by the project prism-ctf itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over prism-ctf.pwnlentoni.team.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: prism-ctf
    app.kubernetes.io/managed-by: kustomize
  name: sharedchallenge-admin-role
rules:
- apiGroups:
  - prism-ctf.pwnlentoni.team
  resources:
  - sharedchallenges
  verbs:
  - '*'
- apiGroups:
  - prism-ctf.pwnlentoni.team
  resources:
  - sharedchallenges/status
  verbs:
  - get
