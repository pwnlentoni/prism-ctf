# permissions for end users to edit isolatedchallenges.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: prism-ctf
    app.kubernetes.io/managed-by: kustomize
  name: isolatedchallenge-editor-role
rules:
- apiGroups:
  - prism-ctf.pwnlentoni.team
  resources:
  - isolatedchallenges
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - prism-ctf.pwnlentoni.team
  resources:
  - isolatedchallenges/status
  verbs:
  - get
