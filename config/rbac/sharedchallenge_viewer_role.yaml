# This rule is not used by the project prism-ctf itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to prism-ctf.pwnlentoni.team resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: prism-ctf
    app.kubernetes.io/managed-by: kustomize
  name: sharedchallenge-viewer-role
rules:
- apiGroups:
  - prism-ctf.pwnlentoni.team
  resources:
  - sharedchallenges
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - prism-ctf.pwnlentoni.team
  resources:
  - sharedchallenges/status
  verbs:
  - get
