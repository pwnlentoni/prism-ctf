# permissions for end users to view sharedchallenges.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: prism-ctf
    app.kubernetes.io/managed-by: kustomize
  name: sharedchallenge-viewer-role
rules:
- apiGroups:
  - prism-ctf.pwnlentoni.team
  resources:
  - sharedchallenges
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - prism-ctf.pwnlentoni.team
  resources:
  - sharedchallenges/status
  verbs:
  - get
